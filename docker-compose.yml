name: streamalpha

x-streamalpha-app-build: &streamalpha-app-build
  image: streamalpha-app:latest
  build:
    context: .
    dockerfile: docker/app.Dockerfile

services:
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:${REDPANDA_VERSION:-v25.3.10}
    container_name: streamalpha-redpanda
    restart: unless-stopped
    profiles: ["dev", "paper", "shadow", "live"]
    command:
      - redpanda
      - start
      - --mode
      - dev-container
      - --smp
      - "1"
      - --default-log-level=info
      - --kafka-addr
      - internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr
      - internal://redpanda:9092,external://localhost:${REDPANDA_EXTERNAL_KAFKA_PORT:-19092}
      - --pandaproxy-addr
      - internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr
      - internal://redpanda:8082,external://localhost:${REDPANDA_EXTERNAL_PANDAPROXY_PORT:-18082}
      - --schema-registry-addr
      - internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --rpc-addr
      - redpanda:33145
      - --advertise-rpc-addr
      - redpanda:33145
      - --set
      - redpanda.auto_create_topics_enabled=true
    ports:
      - ${REDPANDA_EXTERNAL_KAFKA_PORT:-19092}:19092
      - ${REDPANDA_EXTERNAL_ADMIN_PORT:-19644}:9644
      - ${REDPANDA_EXTERNAL_SCHEMA_REGISTRY_PORT:-18081}:18081
      - ${REDPANDA_EXTERNAL_PANDAPROXY_PORT:-18082}:18082
    volumes:
      - redpanda-data:/var/lib/redpanda/data
    healthcheck:
      test:
        - CMD-SHELL
        - rpk cluster health -X brokers=localhost:9092 >/dev/null 2>&1 || exit 1
      interval: 10s
      timeout: 5s
      retries: 12

  redpanda-console:
    image: docker.redpanda.com/redpandadata/console:${REDPANDA_CONSOLE_VERSION:-v3.5.1}
    container_name: streamalpha-redpanda-console
    restart: unless-stopped
    profiles: ["dev", "paper", "shadow", "live"]
    depends_on:
      redpanda:
        condition: service_healthy
    ports:
      - ${REDPANDA_CONSOLE_PORT:-8080}:8080
    environment:
      CONFIG_FILEPATH: /etc/redpanda-console/config.yml
    volumes:
      - ./configs/redpanda-console-config.yml:/etc/redpanda-console/config.yml:ro

  postgres:
    image: postgres:${POSTGRES_VERSION:-16-alpine}
    container_name: streamalpha-postgres
    restart: unless-stopped
    profiles: ["dev", "paper", "shadow", "live"]
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-streamalpha}
      POSTGRES_USER: ${POSTGRES_USER:-streamalpha}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-local-only}
    ports:
      - ${POSTGRES_EXTERNAL_PORT:-5432}:5432
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER:-streamalpha} -d ${POSTGRES_DB:-streamalpha}
      interval: 10s
      timeout: 5s
      retries: 12

  config-check:
    <<: *streamalpha-app-build
    container_name: streamalpha-config-check
    profiles: ["dev", "paper", "shadow", "live"]
    env_file:
      - .env
    environment:
      STREAMALPHA_RUNTIME_PROFILE: ${STREAMALPHA_RUNTIME_PROFILE:-}
      STREAMALPHA_TRADING_CONFIG_PATH: ${STREAMALPHA_TRADING_CONFIG_PATH:-}
      STREAMALPHA_STARTUP_REPORT_PATH: ${STREAMALPHA_STARTUP_REPORT_PATH:-artifacts/runtime/startup_report.json}
      APCA_API_KEY_ID: ${APCA_API_KEY_ID:-}
      APCA_API_SECRET_KEY: ${APCA_API_SECRET_KEY:-}
      ALPACA_BASE_URL: ${ALPACA_BASE_URL:-}
      STREAMALPHA_ENABLE_LIVE: ${STREAMALPHA_ENABLE_LIVE:-}
      STREAMALPHA_LIVE_CONFIRM: ${STREAMALPHA_LIVE_CONFIRM:-}
    volumes:
      - ./artifacts:/workspace/artifacts
    command:
      - python
      - -m
      - app.runtime.validate

  producer:
    <<: *streamalpha-app-build
    container_name: streamalpha-producer
    restart: unless-stopped
    profiles: ["dev", "paper", "shadow", "live"]
    env_file:
      - .env
    environment:
      STREAMALPHA_RUNTIME_PROFILE: ${STREAMALPHA_RUNTIME_PROFILE:-}
      STREAMALPHA_STARTUP_REPORT_PATH: ${STREAMALPHA_STARTUP_REPORT_PATH:-artifacts/runtime/startup_report.json}
      APCA_API_KEY_ID: ${APCA_API_KEY_ID:-}
      APCA_API_SECRET_KEY: ${APCA_API_SECRET_KEY:-}
      ALPACA_BASE_URL: ${ALPACA_BASE_URL:-}
      STREAMALPHA_ENABLE_LIVE: ${STREAMALPHA_ENABLE_LIVE:-}
      STREAMALPHA_LIVE_CONFIRM: ${STREAMALPHA_LIVE_CONFIRM:-}
    depends_on:
      config-check:
        condition: service_completed_successfully
      redpanda:
        condition: service_healthy
      postgres:
        condition: service_healthy
    command:
      - python
      - -m
      - app.ingestion.main

  features:
    <<: *streamalpha-app-build
    container_name: streamalpha-features
    restart: unless-stopped
    profiles: ["dev", "paper", "shadow", "live"]
    env_file:
      - .env
    environment:
      STREAMALPHA_RUNTIME_PROFILE: ${STREAMALPHA_RUNTIME_PROFILE:-}
      STREAMALPHA_STARTUP_REPORT_PATH: ${STREAMALPHA_STARTUP_REPORT_PATH:-artifacts/runtime/startup_report.json}
      APCA_API_KEY_ID: ${APCA_API_KEY_ID:-}
      APCA_API_SECRET_KEY: ${APCA_API_SECRET_KEY:-}
      ALPACA_BASE_URL: ${ALPACA_BASE_URL:-}
      STREAMALPHA_ENABLE_LIVE: ${STREAMALPHA_ENABLE_LIVE:-}
      STREAMALPHA_LIVE_CONFIRM: ${STREAMALPHA_LIVE_CONFIRM:-}
    depends_on:
      config-check:
        condition: service_completed_successfully
      redpanda:
        condition: service_healthy
      postgres:
        condition: service_healthy
    command:
      - python
      - -m
      - app.features.main

  inference:
    <<: *streamalpha-app-build
    container_name: streamalpha-inference
    restart: unless-stopped
    profiles: ["paper", "shadow", "live"]
    env_file:
      - .env
    environment:
      STREAMALPHA_RUNTIME_PROFILE: ${STREAMALPHA_RUNTIME_PROFILE:-}
      STREAMALPHA_TRADING_CONFIG_PATH: ${STREAMALPHA_TRADING_CONFIG_PATH:-}
      STREAMALPHA_STARTUP_REPORT_PATH: ${STREAMALPHA_STARTUP_REPORT_PATH:-artifacts/runtime/startup_report.json}
      APCA_API_KEY_ID: ${APCA_API_KEY_ID:-}
      APCA_API_SECRET_KEY: ${APCA_API_SECRET_KEY:-}
      ALPACA_BASE_URL: ${ALPACA_BASE_URL:-}
      STREAMALPHA_ENABLE_LIVE: ${STREAMALPHA_ENABLE_LIVE:-}
      STREAMALPHA_LIVE_CONFIRM: ${STREAMALPHA_LIVE_CONFIRM:-}
    volumes:
      - ./artifacts:/workspace/artifacts
    depends_on:
      config-check:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    ports:
      - 8000:8000
    command:
      - python
      - -m
      - app.inference
    healthcheck:
      test:
        - CMD-SHELL
        - python -c "import sys, urllib.request; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health').getcode() == 200 else 1)"
      interval: 15s
      timeout: 5s
      retries: 12

  trader:
    <<: *streamalpha-app-build
    container_name: streamalpha-trader
    restart: unless-stopped
    profiles: ["paper", "shadow", "live"]
    env_file:
      - .env
    environment:
      STREAMALPHA_RUNTIME_PROFILE: ${STREAMALPHA_RUNTIME_PROFILE:-}
      STREAMALPHA_TRADING_CONFIG_PATH: ${STREAMALPHA_TRADING_CONFIG_PATH:-}
      STREAMALPHA_STARTUP_REPORT_PATH: ${STREAMALPHA_STARTUP_REPORT_PATH:-artifacts/runtime/startup_report.json}
      APCA_API_KEY_ID: ${APCA_API_KEY_ID:-}
      APCA_API_SECRET_KEY: ${APCA_API_SECRET_KEY:-}
      ALPACA_BASE_URL: ${ALPACA_BASE_URL:-}
      STREAMALPHA_ENABLE_LIVE: ${STREAMALPHA_ENABLE_LIVE:-}
      STREAMALPHA_LIVE_CONFIRM: ${STREAMALPHA_LIVE_CONFIRM:-}
    volumes:
      - ./artifacts:/workspace/artifacts
    depends_on:
      config-check:
        condition: service_completed_successfully
      inference:
        condition: service_healthy
      postgres:
        condition: service_healthy
    command:
      - python
      - scripts/run_paper_trader.py

  dashboard:
    <<: *streamalpha-app-build
    container_name: streamalpha-dashboard
    restart: unless-stopped
    profiles: ["paper", "shadow", "live"]
    env_file:
      - .env
    environment:
      INFERENCE_API_BASE_URL: http://inference:8000
      STREAMALPHA_RUNTIME_PROFILE: ${STREAMALPHA_RUNTIME_PROFILE:-}
      STREAMALPHA_TRADING_CONFIG_PATH: ${STREAMALPHA_TRADING_CONFIG_PATH:-}
      STREAMALPHA_STARTUP_REPORT_PATH: ${STREAMALPHA_STARTUP_REPORT_PATH:-artifacts/runtime/startup_report.json}
      APCA_API_KEY_ID: ${APCA_API_KEY_ID:-}
      APCA_API_SECRET_KEY: ${APCA_API_SECRET_KEY:-}
      ALPACA_BASE_URL: ${ALPACA_BASE_URL:-}
      STREAMALPHA_ENABLE_LIVE: ${STREAMALPHA_ENABLE_LIVE:-}
      STREAMALPHA_LIVE_CONFIRM: ${STREAMALPHA_LIVE_CONFIRM:-}
    volumes:
      - ./artifacts:/workspace/artifacts
    depends_on:
      config-check:
        condition: service_completed_successfully
      inference:
        condition: service_healthy
      postgres:
        condition: service_healthy
    ports:
      - 8501:8501
    command:
      - streamlit
      - run
      - dashboards/streamlit_app.py
      - --server.address=0.0.0.0
      - --server.port=8501

volumes:
  postgres-data:
  redpanda-data:
