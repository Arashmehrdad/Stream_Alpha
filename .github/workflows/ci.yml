name: CI

on:
  push:
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run full pylint
        run: |
          python -m pylint app dashboards tests scripts/run_paper_trader.py

      - name: Run full pytest slice (no external services required)
        run: |
          python -m pytest -q \
            --ignore=tests/trading \
            --deselect=tests/test_adaptation_repository.py \
            --deselect=tests/test_alerting_repository.py \
            --deselect=tests/test_continual_learning_repository.py \
            --deselect=tests/test_ensemble_repository.py \
            --deselect=tests/test_inference_db.py
